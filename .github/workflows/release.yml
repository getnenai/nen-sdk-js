name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # OIDC for npm trusted publishing
  contents: write  # for GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        # Node 22 ships with npm 10.x. Tokenless OIDC publish auth was
        # added in npm CLI 11.5.1 (Aug 2025). Without this upgrade, the
        # publish step's PUT to https://registry.npmjs.org/<pkg> is
        # authenticated by setup-node's stale .npmrc `_authToken` (empty
        # in our flow) and the registry returns 404 even though `--provenance`
        # successfully signed via OIDC. The `--provenance` and tokenless-auth
        # flows are independent — provenance is supported since npm 9.5,
        # tokenless publish auth needs ≥ 11.5.
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "Release ${GITHUB_REF#refs/tags/}" \
            --generate-notes
