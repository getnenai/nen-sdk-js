name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # OIDC for npm trusted publishing
  contents: write  # for GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Node 24 ships npm 11.x bundled (vs Node 22's npm 10.x), which
          # has the OIDC tokenless publish auth that npm trusted publishing
          # needs. Avoids the npm self-upgrade footgun where
          # `npm install -g npm@^11.5.1` deletes its own promise-retry
          # dep mid-install and crashes (see #6).
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        # npm bundled with Node 24 is 11.x, which supports tokenless OIDC
        # publish auth — the registry exchanges the GitHub Actions ID token
        # (via ACTIONS_ID_TOKEN_REQUEST_*) for a short-lived publish token,
        # bypassing the .npmrc placeholder setup-node writes. The Trusted
        # Publisher configured on npmjs.com (repo, workflow, environment)
        # must match the OIDC claims. `--provenance` (SLSA attestation,
        # supported since npm 9.5) is independent of the auth flow.
        run: npm publish --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "Release ${GITHUB_REF#refs/tags/}" \
            --generate-notes
